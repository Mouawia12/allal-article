services:
  db:
    image: postgres:16
    container_name: allal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: allal_article
      POSTGRES_USER: allal_user
      POSTGRES_PASSWORD: allal_pass@39
    ports:
      - "5432:5432"
    volumes:
      - allal_postgres_data:/var/lib/postgresql/data

volumes:
  allal_postgres_data:
