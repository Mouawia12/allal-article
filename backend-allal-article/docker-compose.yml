services:
  db:
    image: postgres:16
    container_name: ${POSTGRES_CONTAINER_NAME:-allal-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-allal_article}
      POSTGRES_USER: ${POSTGRES_USER:-allal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-allal_pass@39}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - allal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: eclipse-temurin:21-jdk
    container_name: ${BACKEND_CONTAINER_NAME:-allal-backend}
    profiles: ["app"]
    working_dir: /app
    env_file:
      - .env
    environment:
      DB_URL: ${DOCKER_DB_URL:-jdbc:postgresql://db:5432/allal_article}
      DB_USERNAME: ${POSTGRES_USER:-allal_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-allal_pass@39}
      SERVER_PORT: ${SERVER_PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    command: ["./mvnw", "spring-boot:run"]
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - .:/app
      - maven_cache:/root/.m2
    depends_on:
      db:
        condition: service_healthy

volumes:
  allal_postgres_data:
  maven_cache:
